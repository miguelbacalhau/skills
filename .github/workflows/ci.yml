name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  BATS_VERSION: 1.11.1

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: command -v shellcheck >/dev/null || brew install shellcheck

      - name: shellcheck
        # find-based so the layout can grow (scripts/verbs/*.sh) without
        # the check rotting on a glob that never matched them.
        run: find scripts .github/scripts -name '*.sh' -exec shellcheck {} +

      - name: Validate JSON manifests
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json .mcp.json; do
            python3 -m json.tool "$f" >/dev/null || { echo "invalid JSON: $f"; exit 1; }
          done

      - name: Contract-vocabulary lockstep check
        run: python3 .github/scripts/lockstep-check.py

      - name: Parse workflow scripts (host-style wrapping)
        run: node .github/scripts/parse-workflow.js scripts/*.workflow.js

      - name: Relay codec and frame decoder
        run: node .github/scripts/frame-decoder-test.js scripts/work-loop.workflow.js

      - name: Install bats
        run: |
          curl -sL "https://github.com/bats-core/bats-core/archive/refs/tags/v${BATS_VERSION}.tar.gz" | tar -xz
          echo "$PWD/bats-core-${BATS_VERSION}/bin" >> "$GITHUB_PATH"

      - name: bats
        run: bats tests/
